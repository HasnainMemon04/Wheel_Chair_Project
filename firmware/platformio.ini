; ===========================================================================
;  Smart Rental Wheelchair — firmware build config (ESP32 WROOM-32)
;  Open the firmware/ folder in VS Code + PlatformIO.
; ===========================================================================
[platformio]
default_envs = esp32-wroom32

[env:esp32-s3]
platform      = espressif32 @ 6.9.0
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; 16MB flash + 8MB OPI PSRAM (N16R8). Adjust if your board differs.
board_build.flash_size          = 16MB
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    mikalhart/TinyGPSPlus
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    adafruit/DHT sensor library
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    bblanchon/ArduinoJson
    ; HTTPS upload to Supabase uses the built-in WiFiClientSecure + HTTPClient.
    ; (Add knolleary/PubSubClient ONLY if you also enable the managed-MQTT path.)

; --- Alternate target: plain ESP32 WROOM-32 (see HARDWARE.md alt pin map) ---
[env:esp32-wroom32]
platform      = espressif32 @ 6.9.0
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps      = ${env:esp32-s3.lib_deps}

; ===========================================================================
;  Milestone M7 Standalone Hardware Test Lab Environments
; ===========================================================================
[env:test-gps]
platform      = espressif32 @ 6.9.0
board         = esp32dev
