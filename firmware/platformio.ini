; ===========================================================================
;  Smart Rental Wheelchair — firmware build config (ESP32 WROOM-32)
;  Open the firmware/ folder in VS Code + PlatformIO.
; ===========================================================================
[platformio]
default_envs = esp32-s3


[env:esp32-s3]
platform      = espressif32 @ 6.9.0
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; 16MB flash + ESP32-S3-WROOM-1 N16R8.
; Note: PSRAM physically present but qio_opi crashes this module's bootloader.
; Our firmware uses only 48KB/320KB RAM (14.7%), so PSRAM is not needed.
board_build.flash_size          = 16MB
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.flash_mode          = dio
board_build.partitions          = partitions.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
build_src_filter = +<*> -<gyro_acc_test.cpp> -<gps_test.cpp> -<dummy.cpp>

lib_deps =
    mikalhart/TinyGPSPlus
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    bblanchon/ArduinoJson

; --- Alternate target: plain ESP32 WROOM-32 (retained for reference) ---
[env:esp32-wroom32]
platform      = espressif32 @ 6.9.0
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps      = ${env:esp32-s3.lib_deps}


